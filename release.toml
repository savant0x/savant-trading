# cargo-release configuration for Savant Trading
# Run: `cargo release patch --dry-run` to preview
#      `cargo release patch --execute` to perform the release
# See: https://github.com/crate-ci/cargo-release/blob/master/docs/reference.md

sign-commit = false
sign-tag = false
push = false
tag = true
tag-name = "v{{version}}"
pre-release-commit-message = "chore: release version {{version}}"
shared-version = true

# Version search-and-replace across these files
pre-release-replacements = [
  { file = "VERSION", search = "[0-9]+\\.[0-9]+\\.[0-9]+", replace = "{{version}}" },
  { file = "Cargo.toml", search = 'version = "[0-9]+\\.[0-9]+\\.[0-9]+"', replace = 'version = "{{version}}"' },
  { file = "protocol.config.yaml", search = 'version: "[0-9]+\\.[0-9]+\\.[0-9]+"', replace = 'version: "{{version}}"' },
  { file = "README.md", search = 'v0\\.1[0-9]\\.[0-9]+', replace = "v{{version}}" },
  { file = "README.md", search = '# SAVANT TRADING v[0-9]+\\.[0-9]+\\.[0-9]+', replace = "# SAVANT TRADING v{{version}}" },
]
