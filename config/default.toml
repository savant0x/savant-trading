[exchange]
name = "kraken"
# Execution backend: "kraken" (CEX, KYC), "0x" (DEX, no KYC), "1inch" (DEX, no KYC)
backend = "0x"
ws_url = "wss://ws.kraken.com/v2"
rest_url = "https://api.kraken.com"

[exchange.dex]
# DEX-specific settings (only used when backend != "kraken")
chain_id = 42161
rpc_url = "https://arb1.arbitrum.io/rpc"
wallet_key_env = "WALLET_PRIVATE_KEY"
api_key_env = "ZEROEX_API_KEY"
slippage_pct = 0.005

# Multi-chain configuration (FID-045)
# Each chain has its own RPC, gas token, and slippage settings.
# The engine scans enabled chains in parallel.
# Add chain IDs to 'enabled' to activate them.
[chains.ethereum]
chain_id = 1
name = "Ethereum"
rpc_url = "https://eth.llamarpc.com"
native_token = "ETH"
min_gas_native = 0.005
slippage_pct = 0.005
enabled = true

[chains.arbitrum]
chain_id = 42161
name = "Arbitrum"
rpc_url = "https://arb1.arbitrum.io/rpc"
native_token = "ETH"
min_gas_native = 0.002
slippage_pct = 0.005
enabled = true

[chains.base]
chain_id = 8453
name = "Base"
rpc_url = "https://mainnet.base.org"
native_token = "ETH"
min_gas_native = 0.001
slippage_pct = 0.005
enabled = true

[chains.optimism]
chain_id = 10
name = "Optimism"
rpc_url = "https://mainnet.optimism.io"
native_token = "ETH"
min_gas_native = 0.001
slippage_pct = 0.0075
enabled = true

[chains.bsc]
chain_id = 56
name = "BNB Smart Chain"
rpc_url = "https://bsc-dataseed.binance.org"
native_token = "BNB"
min_gas_native = 0.005
slippage_pct = 0.01
enabled = false

[trading]
# Core pairs — always tracked, highest liquidity
# BTC & ETH are the foundation. Top 10 + meme coins are where the action is.
pairs = [
    # Tier 1: GUARANTEED deep liquidity on Arbitrum (>$100M daily DEX volume)
    "ETH/USD", "BTC/USD", "ARB/USD",
    # Tier 2: Major DeFi tokens — verified Arbitrum addresses, deep 0x routes
    "LINK/USD", "UNI/USD", "AAVE/USD", "PEPE/USD",
    # Tier 3: DeFi with good Arbitrum presence
    "PENDLE/USD", "COMP/USD", "LDO/USD",
]
# Full deploy mode: concentrate all capital into single best-conviction trade.
# When balance is low, spreading across pairs wastes capital on gas friction.
# The AI picks the highest-confidence setup and deploys everything.
full_deploy = true
# NOTE: SOL, XRP, ADA, AVAX, SHIB, FLOKI, TURBO, MOG are NOT swappable
# on Arbitrum via 0x API — they don't have Arbitrum token addresses.
# Set to true to scan all Kraken USD pairs for opportunity
# WARNING: Scans 455+ pairs, takes 15+ minutes per cycle. Only enable if needed.
scan_all_pairs = false
timeframe = "5m"
timeframes = ["5m", "1h", "4h", "1d"]
base_currency = "USD"
starting_balance = 50.0
database_url = "sqlite:data/savant.db"
# Kraken Pro base tier: 0.40% taker / 0.25% maker
# At $50 balance we are in lowest volume tier
fee_rate = 0.0040
slippage_pct = 0.0005

[risk]
max_risk_per_trade = 0.20
# Position allocation — how much of the bankroll goes into each trade
# At $50 with 5 max positions: each position = $10 (20% of bankroll)
# The bot should be FULLY DEPLOYED, not sitting on cash
# Safety comes from stop losses + daily loss + drawdown limits, not from shrinking positions
dynamic_risk_tiers = [
    { balance = 500.0, risk_pct = 1.00 },    # Full deploy at low balance — 100% of capital into best trade
    { balance = 5000.0, risk_pct = 0.10 },    # 5 positions × 10% = 50% deployed
    { balance = 50000.0, risk_pct = 0.05 },   # 5 positions × 5% = 25% deployed
    { balance = 999999.0, risk_pct = 0.02 },  # 5 positions × 2% = 10% deployed
]
# Dynamic safety nets — scale to balance, never too tight to trade
# At $25: daily_loss=$5 min, drawdown=$10 min. Survivable but allows trading.
# At $500: daily_loss=$50, drawdown=$100. Meaningful protection.
max_daily_loss = 0.05
max_drawdown = 0.10
min_daily_loss_usd = 5.0    # Floor: don't halt on $0.50 loss at tiny balances
min_drawdown_usd = 10.0     # Floor: don't halt on $1 drawdown at tiny balances
max_positions = 3
# Dynamic R:R — relax slightly at very low balances to allow first trade
min_rr_ratio = 1.5
min_rr_ratio_low_balance = 1.2  # When balance < $50, accept tighter R:R
low_balance_threshold = 50.0    # Below this, use relaxed R:R
# Spread filter — reject trades where spread > 30bps (FID-035)
# At $11 positions, 30bps = $0.033 friction. Round-trip gas = $0.06.
# Total friction = $0.093. With 3% stop ($0.33), friction = 28% of margin.
max_spread_bps = 30
# Risk buckets for correlation cap (FID-035)
# Max 1 open position from meme bucket at any time
[risk.buckets]
macro = ["BTC/USD", "ETH/USD", "SOL/USD", "ADA/USD", "AVAX/USD"]
legacy = ["XRP/USD", "LINK/USD", "DOGE/USD"]
meme = ["PEPE/USD", "SHIB/USD", "FLOKI/USD", "TURBO/USD", "MOG/USD"]

[strategy.momentum]
ema_period = 100
volume_spike_multiplier = 2.0
atr_compression_threshold = 0.7

[strategy.mean_reversion]
profile_periods = 100
value_area_pct = 0.70
volume_spike_multiplier = 1.5

[strategy.regime]
adx_period = 14
adx_trending_threshold = 25.0
adx_ranging_threshold = 20.0
atr_volatility_multiplier = 1.5

[mode]
paper_trading = false

[ai]
provider = "openrouter"
endpoint = "https://openrouter.ai/api/v1"
model = "xiaomi/mimo-v2.5-pro"
api_key_env = "OPENROUTER_API_KEY"
autonomy_level = 3
max_decisions_per_hour = 20
# Expanded to use more of the 1M context window (FID-015)
context_window_candles = 500
knowledge_token_budget = 20000
price_tolerance_pct = 0.5
max_retries = 3
# 0.6 optimal for MoE reasoning models emitting structured JSON (FID-015)
temperature = 0.6
# Nucleus sampling — limits token pool to top 95% probability mass
top_p = 0.95
max_tokens = 16384
# Reasoning model needs room for chain-of-thought (FID-015)
timeout_secs = 300

# OpenRouter-specific configuration (only used when provider = "openrouter")
[ai.openrouter]
endpoint = "https://openrouter.ai/api/v1"
model = "xiaomi/mimo-v2.5-pro"
api_key_env = "OPENROUTER_API_KEY"
# Your site URL — OpenRouter uses this for ranking
referer = "https://github.com/spencer-thompson/savant-trading"
# Your app name — shown in OpenRouter dashboard attribution
title = "Savant Trading Engine"

[ai.openrouter.management]
# Management API key (created on OpenRouter dashboard, used for admin operations only)
# Cannot be used for LLM completion calls
management_key_env = "OPENROUTER_MANAGEMENT_KEY"
endpoint = "https://openrouter.ai/api/v1/keys"

# NVIDIA NIM configuration (only used when provider = "nvidia")
[ai.nvidia]
endpoint = "https://integrate.api.nvidia.com/v1"
model = "deepseek-ai/deepseek-v4-flash"
api_key_env = "NVIDIA_API_KEY"

[insight]
funding_rate_enabled = true
liquidation_enabled = true
fear_greed_enabled = true
btc_dominance_enabled = true
exchange_flows_enabled = true
news_sentiment_enabled = true
rss_enabled = true
rss_max_items = 10
onchain_enabled = true

[insight.coinmarketcap]
# CoinMarketCap API for dynamic pair discovery
# Free tier: 10K calls/month, data refreshed every 1 minute
api_key_env = "COINMARKETCAP_API_KEY"
# How many top coins to fetch for pair discovery
top_coins_limit = 100
# Minimum 24h volume to consider a pair tradeable (USD)
min_volume_24h = 1000000
# Minimum volatility score to include in active trading
min_volatility_score = 5.0

[training]
# Minimum sample size for semantic pattern promotion
min_sample_size = 5
# Win rate threshold below which a condition is an anti-pattern
failure_win_rate = 0.30
# Maximum portfolio heat (total risk / equity)
max_portfolio_heat = 0.40
# SQLite backup interval in hours
backup_interval_hours = 6
# Maximum number of backup files to keep
max_backups = 7
# Knowledge utility learning rate (per episode)
utility_learning_rate = 0.05
# Minimum utility score before knowledge unit is archived
utility_archive_threshold = 0.30
# Maximum active experience replay lessons
max_active_lessons = 50
# Brier score threshold for confidence cap enforcement
brier_cap_threshold = 0.25
# Minimum trades before memory context activates
memory_context_min_trades = 5
