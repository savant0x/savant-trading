[exchange]
name = "kraken"
ws_url = "wss://ws.kraken.com/v2"
rest_url = "https://api.kraken.com"

[trading]
pairs = ["BTC/USD", "ETH/USD"]
timeframe = "5m"
base_currency = "USD"
starting_balance = 100.0
database_url = "sqlite:data/savant.db"
fee_rate = 0.0026
slippage_pct = 0.0005

[risk]
max_risk_per_trade = 0.01
max_daily_loss = 0.03
max_drawdown = 0.10
max_positions = 3
min_rr_ratio = 1.5

[strategy.momentum]
ema_period = 100
volume_spike_multiplier = 2.0
atr_compression_threshold = 0.7

[strategy.mean_reversion]
profile_periods = 100
value_area_pct = 0.70
volume_spike_multiplier = 1.5

[strategy.regime]
adx_period = 14
adx_trending_threshold = 25.0
adx_ranging_threshold = 20.0
atr_volatility_multiplier = 1.5

[mode]
paper_trading = true

[ai]
provider = "opengateway"
endpoint = "https://opengateway.gitlawb.com/v1"
model = "mimo-v2.5-pro"
api_key_env = "OPENGATEWAY_API_KEY"
autonomy_level = 3
max_decisions_per_hour = 5
context_window_candles = 100
knowledge_token_budget = 8000
price_tolerance_pct = 10.0
max_retries = 3
temperature = 0.7
max_tokens = 4096

[insight]
funding_rate_enabled = false
liquidation_enabled = false
fear_greed_enabled = true
btc_dominance_enabled = true
exchange_flows_enabled = false
news_sentiment_enabled = false
