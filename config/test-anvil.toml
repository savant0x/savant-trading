[exchange]
name = "market_data"
backend = "0x"
ws_url = "wss://ws.kraken.com/v2"
rest_url = "https://api.kraken.com"

[exchange.dex]
chain_id = 42161
# ALL RPC traffic goes to the local Anvil fork
rpc_url = "http://127.0.0.1:8545"
wallet_key_env = "WALLET_PRIVATE_KEY"
api_key_env = "ZEROEX_API_KEY"
slippage_pct = 0.0030

# Multi-chain configuration (FID-045)
# Only Arbitrum is enabled — it's the only chain we're forking.
[chains.ethereum]
chain_id = 1
name = "Ethereum"
rpc_url = "https://eth.llamarpc.com"
native_token = "ETH"
min_gas_native = 0.005
slippage_pct = 0.005
enabled = false

[chains.arbitrum]
chain_id = 42161
name = "Arbitrum"
rpc_url = "http://127.0.0.1:8545"
native_token = "ETH"
min_gas_native = 0.002
slippage_pct = 0.005
enabled = true

[chains.base]
chain_id = 8453
name = "Base"
rpc_url = "https://mainnet.base.org"
native_token = "ETH"
min_gas_native = 0.001
slippage_pct = 0.005
enabled = false

[chains.optimism]
chain_id = 10
name = "Optimism"
rpc_url = "https://mainnet.optimism.io"
native_token = "ETH"
min_gas_native = 0.001
slippage_pct = 0.0075
enabled = false

[chains.bsc]
chain_id = 56
name = "BNB Smart Chain"
rpc_url = "https://bsc-dataseed.binance.org"
native_token = "BNB"
min_gas_native = 0.001
slippage_pct = 0.005
enabled = false

[chains.sepolia]
chain_id = 11155111
name = "Ethereum Sepolia"
rpc_url = "https://rpc.sepolia.org"
native_token = "ETH"
min_gas_native = 0.0001
slippage_pct = 0.01
enabled = false

[trading]
# Restored from committed default.toml (removed in recent working tree edits)
pairs = [
    "WETH/USD", "BTC/USD", "ARB/USD",
    "LINK/USD", "UNI/USD", "AAVE/USD", "PEPE/USD",
    "PENDLE/USD", "COMP/USD", "LDO/USD",
    "CRV/USD", "RENDER/USD", "FET/USD", "DOT/USD",
    "ENA/USD", "MAGIC/USD", "GNS/USD", "JOE/USD",
]
full_deploy = true
# FID-189 ROLLBACK 2026-06-21 (FID-226): scan_all_pairs = true routes engine to
# candle_api.discover_safe_usd_pairs() (Kraken REST AssetPairs + Ticker per
# pair, batched in chunks of 20). Prior 'false' capped pair universe at the
# static 18-pair TOML list → ~12 pairs after hygiene filters → 0 BUYs over
# 12+ hours of FID-225 post-hotfix running. The new universe is ~150-300
# tradable USD pairs. Partner fix at FID-226: probe_threshold-method + verdict
# gate 'is_probe' escape hatch in decision_parser.rs so the larger universe
# doesn't get drowned in PASS verdicts.
scan_all_pairs = true
min_volume_24h_usd = 500000.0
min_price_usd = 0.001
blacklisted_symbols = []
timeframe = "5m"
timeframes = ["5m", "1h", "4h", "1d"]
base_currency = "USD"
# Match our prefunded balance on the fork
starting_balance = 50.0
database_url = "sqlite:data/savant.db"
fee_rate = 0.0005
slippage_pct = 0.0030

[trading.pair_rotation]
interval_cycles = 60
eviction_threshold = 5
revival_check_cycles = 300

# FID-227: Funnel v1 enabled on testnet so the top-K selection path is live.
# In hunt_mode (0 positions) the funnel still bypasses (PassThrough), but the
# Anvil-native bypass in src/engine/mod.rs handles that case via SAVANT_GATE_DISABLED.
[trading.funnel_v1]
enabled = true
top_k = 12
min_score_threshold = 0.20

[token_store]
enabled = true
discovery_interval_cycles = 10
min_volume_usd = 1000000.0
min_holders = 500
validate_via_0x = true
persist_path = "data/tokens.json"

[risk]
max_risk_per_trade = 0.005
dynamic_risk_tiers = [
    { balance = 500.0, risk_pct = 0.005 },
    { balance = 5000.0, risk_pct = 0.003 },
    { balance = 50000.0, risk_pct = 0.002 },
    { balance = 999999.0, risk_pct = 0.001 },
]
max_daily_loss = 0.05
max_drawdown = 0.99
min_daily_loss_usd = 2.50
min_drawdown_usd = 5.00
max_positions = 1
min_rr_ratio = 1.5
min_rr_ratio_low_balance = 1.2
low_balance_threshold = 50.0
spread_filter_bps = 30.0
session_penalty_deep_asian = 0.90

[risk.buckets]
macro = ["BTC/USD", "ETH/USD", "SOL/USD", "ADA/USD", "AVAX/USD"]
legacy = ["XRP/USD", "LINK/USD", "DOGE/USD"]
meme = ["PEPE/USD", "SHIB/USD", "FLOKI/USD", "TURBO/USD", "MOG/USD"]

[strategy.momentum]
ema_period = 100
volume_spike_multiplier = 2.0
atr_compression_threshold = 0.7

[strategy.mean_reversion]
profile_periods = 100
value_area_pct = 0.70
volume_spike_multiplier = 1.5

[strategy.regime]
adx_period = 14
adx_trending_threshold = 25.0
adx_ranging_threshold = 20.0
atr_volatility_multiplier = 1.5

[mode]
# LIVE on the Anvil fork — real transactions, but forked state only
live_execution = true
# FID-209: Bypass spread filter on Anvil (0x doesn't index forked tokens).
# This is what allows the engine to actually execute trades on the local fork.
is_anvil = true

[insight]
funding_rate_enabled = true
liquidation_enabled = true
fear_greed_enabled = true
btc_dominance_enabled = true
exchange_flows_enabled = true
news_sentiment_enabled = true
rss_enabled = true
rss_max_items = 10
onchain_enabled = true

[insight.coinmarketcap]
api_key_env = "COINMARKETCAP_API_KEY"
top_coins_limit = 100
min_volume_24h = 1000000
min_volatility_score = 5.0

[training]
min_sample_size = 5
failure_win_rate = 0.30
max_portfolio_heat = 0.40
backup_interval_hours = 6
max_backups = 7
utility_learning_rate = 0.05
utility_archive_threshold = 0.30
max_active_lessons = 50
brier_cap_threshold = 0.25
memory_context_min_trades = 5

# FID-147: Wallet Reconciliation Heartbeat — pointed at the fork
[reconciliation]
chain_id = 42161
wallet_address = "0x543CA0434B84aD38c858D2D178D2082521711fBC"
rpc_url = "http://127.0.0.1:8545"
divergence_threshold_usd = 0.10
divergence_threshold_pct = 0.01
interval_cycles = 1
